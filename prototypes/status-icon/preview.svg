      <rect x="8.25" y="10.15" width="9.25" height="7.35" rx="3.675" fill="currentColor" mask="url(#digit-nine)"/>
    </symbol>

    <pattern id="pixel-grid" width="10" height="10" patternUnits="userSpaceOnUse">
      <path d="M10 0H0V10" fill="none" stroke="#d7dce1" stroke-width="1"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#1b2730" flood-opacity=".13"/>
    </filter>
