      <path d="M15.05 16.55v-5.1l-3.15 3.2h4.35" fill="none" stroke="#000" stroke-width="1.15" stroke-linecap="round" stroke-linejoin="round"/>
    </mask>
    <mask id="clear-nine" maskUnits="userSpaceOnUse" x="0" y="0" width="18" height="18">
