<!doctype html>
<!-- Four GitHubBar popover variants, switchable via ?variant=, on a standalone throwaway prototype route. -->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GitHubBar Popover Prototype</title>
  <style>
    :root {
      color-scheme: dark;
      --desktop-top: #1e4860;
      --desktop-bottom: #08151c;
      --panel: rgba(25, 27, 30, 0.965);
      --panel-soft: #222529;
      --panel-raised: #292d31;
      --line: rgba(255, 255, 255, 0.105);
      --line-strong: rgba(255, 255, 255, 0.18);
      --text: #f4f5f6;
      --muted: #9ca2a8;
      --dim: #71777d;
      --accent: #63c6d5;
      --accent-soft: rgba(99, 198, 213, 0.14);
      --danger: #ff9e8e;
      --warning: #f5c76a;
      --success: #70d39a;
      --shadow: 0 28px 80px rgba(0, 0, 0, 0.55), 0 6px 18px rgba(0, 0, 0, 0.32);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      min-width: 840px;
      min-height: 900px;
      margin: 0;
      overflow: hidden;
      color: var(--text);
      background:
        radial-gradient(circle at 22% 12%, rgba(97, 181, 196, 0.28), transparent 28%),
        radial-gradient(circle at 75% 76%, rgba(57, 109, 126, 0.42), transparent 34%),
        linear-gradient(150deg, var(--desktop-top), var(--desktop-bottom) 66%);
    }

    body::after {
      position: fixed;
      inset: 0;
      pointer-events: none;
      content: "";
      opacity: 0.18;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 180 180' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.18'/%3E%3C/svg%3E");
      mix-blend-mode: soft-light;
    }

    button, a { font: inherit; }
    button { color: inherit; }
    button:focus-visible, a:focus-visible {
      outline: 2px solid rgba(126, 213, 226, .9);
      outline-offset: 2px;
    }

    .menu-bar {
      position: fixed;
      z-index: 10;
      top: 0;
      left: 0;
      right: 0;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      color: rgba(255,255,255,.94);
      background: rgba(12, 20, 25, 0.58);
      border-bottom: 1px solid rgba(255,255,255,.12);
      backdrop-filter: blur(26px) saturate(1.3);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    .menu-left, .menu-right { display: flex; align-items: center; gap: 16px; }
    .menu-right { gap: 14px; color: rgba(255,255,255,.82); }

    .status-trigger {
      position: relative;
      width: 24px;
      height: 24px;
      display: grid;
      place-items: center;
      margin: 0 -5px;
      padding: 0;
      border: 0;
      border-radius: 6px;
      background: rgba(255,255,255,.15);
      overflow: visible;
      cursor: default;
    }

    .mark {
      width: 16px;
      height: 16px;
      display: grid;
      place-items: center;
      color: rgba(255,255,255,.94);
    }

    .mark svg { width: 15px; height: 15px; display: block; fill: none; stroke: currentColor; stroke-width: 1.65; stroke-linecap: round; stroke-linejoin: round; }

    .status-count {
      position: absolute;
      z-index: 2;
      right: -2px;
      bottom: -2px;
      min-width: 11px;
      height: 11px;
      display: grid;
      place-items: center;
      padding: 0 2px;
      border: 1px solid rgba(15,27,36,.8);
      border-radius: 6px;
      color: #14202a;
      background: #f4f5f6;
      box-shadow: 0 1px 2px rgba(0,0,0,.3);
      font-size: 7px;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      line-height: 1;
    }

    .status-trigger[data-count="0"] .status-count { display: none; }

    .desktop-note {
      position: fixed;
      top: 64px;
      left: 42px;
      width: 250px;
      color: rgba(255,255,255,.58);
      font-size: 13px;
      line-height: 1.55;
    }

    .desktop-note strong {
      display: block;
      margin-bottom: 6px;
      color: rgba(255,255,255,.84);
      font-size: 15px;
    }

    .stage {
      position: fixed;
      z-index: 2;
      top: 39px;
      left: 50%;
      transform: translateX(-12%);
    }

    .popover {
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,.22);
      border-radius: 15px;
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(36px) saturate(1.2);
      transform-origin: 70% 0;
      animation: enter 180ms cubic-bezier(.2,.8,.2,1) both;
    }

    .popover::before {
      position: absolute;
      z-index: 3;
      top: -7px;
      right: 82px;
      width: 13px;
      height: 13px;
      content: "";
      background: var(--panel);
      border-top: 1px solid rgba(255,255,255,.22);
      border-left: 1px solid rgba(255,255,255,.22);
      transform: rotate(45deg);
    }

    @keyframes enter {
      from { opacity: 0; transform: translateY(-8px) scale(.985); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .app-header {
      position: relative;
      z-index: 4;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 17px 12px;
      border-bottom: 1px solid var(--line);
      background: rgba(31,34,37,.88);
    }

    .app-title {
      margin: 0;
      font-size: 15px;
      font-weight: 750;
      letter-spacing: -.025em;
    }

    .account-line {
      margin-top: 3px;
      color: var(--muted);
      font-size: 11px;
    }

    .header-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 11px;
      white-space: nowrap;
    }

    .state-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--success);
      box-shadow: 0 0 0 3px rgba(112,211,154,.12);
    }

    .state-dot.loading { background: var(--accent); animation: pulse 1.15s ease-in-out infinite; }
    .state-dot.stale { background: var(--warning); box-shadow: 0 0 0 3px rgba(245,199,106,.12); }
    .state-dot.error { background: var(--danger); box-shadow: 0 0 0 3px rgba(255,158,142,.12); }

    @keyframes pulse { 50% { opacity: .35; transform: scale(.75); } }

    .state-controls {
      display: flex;
      align-items: center;
      gap: 3px;
      padding: 6px 10px;
      border-bottom: 1px solid var(--line);
      background: rgba(12,14,16,.32);
    }

    .state-controls span {
      margin-right: auto;
      color: var(--dim);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    .state-button {
      padding: 4px 7px;
      border: 0;
      border-radius: 6px;
      color: var(--muted);
      background: transparent;
      cursor: pointer;
      font-size: 10px;
    }

    .state-button:hover { color: var(--text); background: rgba(255,255,255,.07); }
    .state-button.active { color: var(--text); background: rgba(255,255,255,.11); }

    .repo-filter-strip {
      position: relative;
      z-index: 18;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 12px;
      border-bottom: 1px solid var(--line);
      background: rgba(17,19,21,.58);
    }

    .repo-filter-label {
      color: var(--dim);
      font-size: 9px;
      font-weight: 740;
      letter-spacing: .07em;
      text-transform: uppercase;
    }

    .repo-filter-button {
      min-width: 0;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-left: auto;
      padding: 5px 8px;
      border: 1px solid var(--line-strong);
      border-radius: 7px;
      color: #dfe2e4;
      background: rgba(255,255,255,.055);
      cursor: pointer;
      font-size: 10px;
    }

    .repo-filter-button:hover { background: rgba(255,255,255,.09); }
    .repo-filter-button strong { max-width: 240px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .repo-filter-button .persisted { color: var(--success); font-size: 8px; }

    .repo-filter-menu {
      position: absolute;
      top: 38px;
      right: 11px;
      width: 294px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,.2);
      border-radius: 11px;
      background: rgba(36,39,43,.985);
      box-shadow: 0 18px 45px rgba(0,0,0,.56);
    }

    .repo-filter-menu[hidden] { display: none; }
    .filter-menu-heading { padding: 10px 11px 8px; border-bottom: 1px solid var(--line); }
    .filter-menu-heading strong { display: block; font-size: 11px; }
    .filter-menu-heading span { display: block; margin-top: 2px; color: var(--dim); font-size: 9px; }

    .filter-all,
    .filter-repo {
      width: 100%;
      display: grid;
      grid-template-columns: 18px minmax(0,1fr) auto;
      align-items: center;
      gap: 7px;
      padding: 8px 11px;
      border: 0;
      border-bottom: 1px solid rgba(255,255,255,.052);
      color: #e8eaec;
      background: transparent;
      cursor: pointer;
      font-size: 10px;
      text-align: left;
    }

    .filter-all:hover, .filter-repo:hover { background: rgba(255,255,255,.055); }
    .filter-check {
      width: 15px;
      height: 15px;
      display: grid;
      place-items: center;
      border: 1px solid var(--line-strong);
      border-radius: 4px;
      color: transparent;
      font-size: 9px;
    }

    .filter-all.active .filter-check,
    .filter-repo.active .filter-check { color: #102026; border-color: var(--accent); background: var(--accent); }
    .filter-repo-name { overflow: hidden; font-family: ui-monospace, "SFMono-Regular", Menlo, monospace; text-overflow: ellipsis; white-space: nowrap; }
    .filter-repo-count { color: var(--dim); font-size: 9px; }
    .filter-menu-footer { display: flex; align-items: center; padding: 8px 10px; color: var(--dim); font-size: 9px; }
    .filter-menu-footer button { margin-left: auto; }

    .state-banner {
      display: none;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      color: #f8e1ad;
      background: rgba(121, 84, 18, .32);
      border-bottom: 1px solid rgba(245,199,106,.24);
      font-size: 11px;
    }

    .state-banner.error {
      color: #ffd3cc;
      background: rgba(124, 45, 38, .34);
      border-color: rgba(255,158,142,.23);
    }

    body[data-state="stale"] .state-banner.stale,
    body[data-state="error"] .state-banner.error { display: flex; }

    .refresh-spinner {
      display: none;
      width: 11px;
      height: 11px;
      border: 1.5px solid rgba(255,255,255,.2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }

    body[data-state="loading"] .refresh-spinner { display: block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .section {
      border-bottom: 1px solid var(--line);
    }

    .section-header {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px 7px;
      border: 0;
      color: var(--text);
      background: transparent;
      cursor: pointer;
      text-align: left;
    }

    .section-header:hover { background: rgba(255,255,255,.025); }
    .section-title { font-size: 12px; font-weight: 720; letter-spacing: -.01em; }
    .section-count {
      min-width: 23px;
      padding: 2px 6px;
      border-radius: 999px;
      color: var(--muted);
      background: rgba(255,255,255,.07);
      font-size: 10px;
      font-variant-numeric: tabular-nums;
      text-align: center;
    }

    .section-summary { margin-left: auto; color: var(--dim); font-size: 10px; }
    .chevron { color: var(--dim); font-size: 10px; transition: transform 150ms ease; }
    .section.collapsed .chevron { transform: rotate(-90deg); }
    .section.collapsed .section-body { display: none; }

    .pr-row {
      position: relative;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      min-height: 51px;
      padding: 8px 14px 8px 16px;
      border-top: 1px solid rgba(255,255,255,.055);
      cursor: pointer;
      transition: background 120ms ease;
    }

    .pr-row:hover, .pr-row.selected { background: rgba(255,255,255,.052); }
    .pr-row.selected::before {
      position: absolute;
      top: 8px;
      bottom: 8px;
      left: 0;
      width: 3px;
      content: "";
      border-radius: 0 3px 3px 0;
      background: var(--accent);
    }

    .pr-main { min-width: 0; }
    .pr-repo {
      color: var(--muted);
      font-family: ui-monospace, "SFMono-Regular", Menlo, monospace;
      font-size: 9.5px;
      letter-spacing: -.015em;
    }

    .pr-title {
      overflow: hidden;
      margin-top: 3px;
      color: #f3f4f5;
      font-size: 12px;
      font-weight: 575;
      letter-spacing: -.012em;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .pr-meta { margin-top: 4px; color: var(--dim); font-size: 9.5px; }
    .pr-number { color: var(--muted); }

    .roster {
      align-self: center;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      min-width: 92px;
      padding-left: 8px;
    }

    .avatar {
      width: 24px;
      height: 24px;
      display: grid;
      place-items: center;
      margin-left: -6px;
      overflow: hidden;
      border: 2px solid #24272a;
      border-radius: 50%;
      color: white;
      background: var(--avatar, #59636f);
      box-shadow: 0 1px 4px rgba(0,0,0,.35);
      font-size: 8.5px;
      font-weight: 800;
      letter-spacing: -.02em;
    }

    .avatar:first-child { margin-left: 0; }
    .avatar.team { border-radius: 7px; background: #44546b; }
    .avatar.more { background: #3a3e43; color: #c4c8cc; }

    .row-actions {
      grid-column: 1 / -1;
      display: none;
      align-items: center;
      gap: 5px;
      margin: 2px 0 2px;
    }

    .pr-row.selected .row-actions { display: flex; }

    .small-action {
      padding: 5px 8px;
      border: 1px solid var(--line-strong);
      border-radius: 6px;
      color: #dfe2e4;
      background: rgba(255,255,255,.055);
      cursor: pointer;
      font-size: 9px;
      text-decoration: none;
    }

    .small-action:hover { border-color: rgba(255,255,255,.28); background: rgba(255,255,255,.1); }
    .small-action.primary { border-color: rgba(99,198,213,.38); background: var(--accent-soft); color: #9ee4ee; }
    .small-action.danger:hover { color: #ffd2ca; border-color: rgba(255,158,142,.35); }

    .show-more {
      width: 100%;
      padding: 8px 14px;
      border: 0;
      border-top: 1px solid rgba(255,255,255,.055);
      color: var(--muted);
      background: rgba(255,255,255,.018);
      cursor: pointer;
      font-size: 10px;
      text-align: center;
    }

    .show-more:hover { color: var(--text); background: rgba(255,255,255,.045); }

    .app-footer {
      display: grid;
      gap: 1px;
      padding: 6px;
      background: rgba(13,15,17,.38);
    }

    .footer-action {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 7px 9px;
      border: 0;
      border-radius: 7px;
      color: #d9dcde;
      background: transparent;
      cursor: pointer;
      font-size: 11px;
      text-align: left;
    }

    .footer-action:hover { background: rgba(255,255,255,.065); }
    .footer-key { margin-left: auto; color: var(--dim); font-size: 9px; }

    /* Variant A: all three lists are visible as a dense native stack. */
    .variant-a { width: 476px; height: min(812px, calc(100vh - 106px)); display: flex; flex-direction: column; }
    .variant-a .scroll-area { flex: 1; min-height: 0; overflow: auto; scrollbar-width: thin; }
    .variant-a .drafts .pr-row { opacity: .72; }

    /* Variant B: review-first tabs and a calmer, editorial queue. */
    .variant-b { width: 535px; height: min(795px, calc(100vh - 106px)); display: flex; flex-direction: column; }
    .variant-b .app-header { padding: 16px 18px; }
    .review-hero {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 18px;
      padding: 18px;
      background:
        linear-gradient(120deg, rgba(99,198,213,.15), transparent 55%),
        rgba(255,255,255,.015);
      border-bottom: 1px solid var(--line);
    }

    .hero-kicker { color: #9bdde6; font-size: 10px; font-weight: 750; letter-spacing: .09em; text-transform: uppercase; }
    .hero-count { margin-top: 4px; font-size: 28px; font-weight: 760; letter-spacing: -.055em; }
    .hero-copy { margin-top: 3px; color: var(--muted); font-size: 11px; }
    .hero-oldest { align-self: center; color: var(--muted); font-size: 10px; text-align: right; line-height: 1.5; }
    .hero-oldest strong { display: block; color: var(--text); font-size: 13px; }

    .tabs {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 4px;
      margin: 10px 12px 5px;
      padding: 3px;
      border-radius: 9px;
      background: rgba(255,255,255,.055);
    }

    .tab {
      padding: 7px 8px;
      border: 0;
      border-radius: 7px;
      color: var(--muted);
      background: transparent;
      cursor: pointer;
      font-size: 10px;
    }

    .tab.active { color: var(--text); background: #34383d; box-shadow: 0 1px 4px rgba(0,0,0,.28); }
    .tab b { margin-left: 3px; color: inherit; font-variant-numeric: tabular-nums; }
    .variant-b .tab-panel { flex: 1; min-height: 0; overflow: auto; padding: 4px 10px 10px; scrollbar-width: thin; }
    .variant-b .pr-row { margin-top: 7px; padding: 11px 12px; border: 1px solid var(--line); border-radius: 10px; background: rgba(255,255,255,.022); }
    .variant-b .pr-row:hover, .variant-b .pr-row.selected { border-color: rgba(255,255,255,.17); background: rgba(255,255,255,.05); }
    .variant-b .pr-row.selected::before { top: 12px; bottom: 12px; }
    .variant-b .pr-title { margin-top: 5px; font-size: 13px; }
    .variant-b .pr-meta { margin-top: 6px; }
    .queue-note { padding: 8px 4px 2px; color: var(--dim); font-size: 10px; }

    /* Variant C: a compact navigation rail and focused working list. */
    .variant-c { width: 620px; height: min(744px, calc(100vh - 106px)); display: flex; flex-direction: column; }
    .variant-c .app-header { height: 59px; }
    .workspace { flex: 1; min-height: 0; display: grid; grid-template-columns: 155px minmax(0,1fr); }
    .rail {
      display: flex;
      flex-direction: column;
      padding: 11px 8px;
      background: rgba(12,14,16,.47);
      border-right: 1px solid var(--line);
    }

    .rail-label { padding: 5px 9px 7px; color: var(--dim); font-size: 9px; font-weight: 750; letter-spacing: .09em; text-transform: uppercase; }
    .rail-item {
      display: grid;
      grid-template-columns: 20px minmax(0,1fr) auto;
      align-items: center;
      gap: 6px;
      padding: 8px 8px;
      border: 0;
      border-radius: 7px;
      color: var(--muted);
      background: transparent;
      cursor: pointer;
      font-size: 10.5px;
      text-align: left;
    }

    .rail-item:hover { background: rgba(255,255,255,.045); color: var(--text); }
    .rail-item.active { background: rgba(99,198,213,.12); color: #b4e8ef; }
    .rail-icon { text-align: center; opacity: .8; }
    .rail-count { color: var(--dim); font-size: 9px; font-variant-numeric: tabular-nums; }
    .rail-item.active .rail-count { color: #86d1dc; }
    .rail-divider { height: 1px; margin: 10px 8px; background: var(--line); }
    .rail-spacer { flex: 1; }
    .coverage { margin: 7px; padding: 9px; border: 1px solid var(--line); border-radius: 8px; color: var(--dim); font-size: 9px; line-height: 1.45; }
    .coverage strong { display: block; margin-bottom: 2px; color: var(--muted); font-size: 10px; }

    .focus-pane { min-width: 0; display: flex; flex-direction: column; }
    .focus-heading { display: flex; align-items: center; gap: 8px; padding: 13px 15px 10px; border-bottom: 1px solid var(--line); }
    .focus-heading h2 { margin: 0; font-size: 13px; letter-spacing: -.02em; }
    .focus-heading p { margin: 2px 0 0; color: var(--dim); font-size: 9.5px; }
    .focus-total { margin-left: auto; color: var(--muted); font-size: 10px; }
    .focus-list { flex: 1; min-height: 0; overflow: auto; scrollbar-width: thin; }
    .variant-c .pr-row { min-height: 58px; padding: 10px 14px; }
    .variant-c .pr-title { font-size: 12.5px; }
    .variant-c .roster { min-width: 106px; }
    .focus-bottom { display: flex; align-items: center; gap: 8px; padding: 9px 12px; border-top: 1px solid var(--line); color: var(--dim); font-size: 9.5px; }
    .focus-bottom button { margin-left: auto; }

    /* Variant D: GitHubBar content inside CodexBar's narrow, flat native-menu skeleton. */
    .variant-d {
      width: 364px;
      max-height: min(822px, calc(100vh - 106px));
      display: flex;
      flex-direction: column;
      color: #e7e8e9;
      background: rgba(27, 30, 33, .985);
      border-color: rgba(255,255,255,.3);
      border-radius: 11px;
      box-shadow: 0 24px 60px rgba(0,0,0,.58), 0 4px 14px rgba(0,0,0,.42);
    }

    .variant-d.has-startup-state { min-height: 470px; }

    .variant-d.popover::before { right: 38px; background: #1b1e21; }

    .codexbar-header {
      display: grid;

<body data-state="fresh">
  <header class="menu-bar" aria-label="macOS menu bar mock">

        <span class="mark" aria-hidden="true"><svg viewBox="0 0 24 24"><circle cx="6" cy="5" r="2"/><circle cx="6" cy="19" r="2"/><path d="M6 7v10M18 17v-5a3 3 0 0 0-3-3h-4M14 6l-3 3 3 3"/></svg></span><span class="status-count" id="statusMenuCount">12</span>
      </button>
      <span>Tue 19:42</span>
    </div>
  </header>

  <aside class="desktop-note">
    <strong>Throwaway interaction prototype</strong>
    Use the bottom switcher or ← → keys for variants. The scenario controls exercise connection, refresh, and access states without changing the accepted layout.
  </aside>

  <main class="stage" id="stage"></main>
  <nav class="prototype-switcher" aria-label="Prototype variant switcher">
    <button id="previousVariant" aria-label="Previous variant">←</button>
    <div class="variant-label" id="variantLabel"></div>
    <button id="nextVariant" aria-label="Next variant">→</button>
  </nav>
  <nav class="scenario-switcher" aria-label="Prototype scenario switcher">
    <strong>Scenario</strong>
    <div class="scenario-options">
      <button class="scenario-option" data-scenario="fresh" aria-pressed="false">Fresh</button>
      <button class="scenario-option" data-scenario="initial" aria-pressed="false">First load</button>
      <button class="scenario-option" data-scenario="loading" aria-pressed="false">Refreshing</button>
      <button class="scenario-option" data-scenario="stale" aria-pressed="false">Cached</button>
      <button class="scenario-option" data-scenario="error" aria-pressed="false">Failed</button>
      <button class="scenario-option" data-scenario="partial" aria-pressed="false">Incomplete access</button>
      <button class="scenario-option" data-scenario="cli-missing" aria-pressed="false">CLI missing</button>
      <button class="scenario-option" data-scenario="cli-signin" aria-pressed="false">Sign in</button>
      <button class="scenario-option" data-scenario="confirm-account" aria-pressed="false">Choose account</button>
    </div>
  </nav>
  <div class="toast" id="toast" role="status"></div>

  <script>
    const variants = [
      { key: 'A', name: 'Dense stack' },
      { key: 'B', name: 'Review-first tabs' },
      { key: 'C', name: 'Navigation rail' },
      { key: 'D', name: 'CodexBar native menu' },
    ];

    const scenarios = ['fresh', 'initial', 'loading', 'stale', 'error', 'partial', 'cli-missing', 'cli-signin', 'confirm-account'];
    const dataScenarios = ['fresh', 'loading', 'stale', 'error', 'partial'];
    let selectedAccount = 'FranciscoMoretti';

    const filterableRepositories = [
      'acme/work-monorepo',
      'FranciscoMoretti/chat-js',
      'FranciscoMoretti/osbe',
      'openai/codex',
    ];

    const repositoryTotals = {
      'acme/work-monorepo': { reviews: 4, mine: 38, drafts: 5 },
      'FranciscoMoretti/chat-js': { reviews: 2, mine: 41, drafts: 7 },
      'FranciscoMoretti/osbe': { reviews: 1, mine: 29, drafts: 3 },
      'openai/codex': { reviews: 3, mine: 0, drafts: 0 },
    };

    const allRepositoryTotals = { reviews: 12, mine: 487, drafts: 24 };
    const repositorySelectionKey = 'githubbar-prototype-repository-selection';

    const datasets = {
      reviews: [
        { repo: 'acme/work-monorepo', number: 18421, title: 'Stream tool output without blocking the response loop', meta: 'requested 3h ago · by maya-l', reviewers: ['FM', 'AK', 'team:Core'] },
        { repo: 'openai/codex', number: 9127, title: 'Preserve reasoning parts across provider retries', meta: 'requested 7h ago · by nico', reviewers: ['FM', 'JM'] },
        { repo: 'better-auth/better-auth', number: 6732, title: 'Add organization-scoped session invalidation', meta: 'requested yesterday · by tessa', reviewers: ['FM', 'team:Auth'] },
        { repo: 'acme/work-monorepo', number: 408, title: 'Unify attachment previews in compact messages', meta: 'requested yesterday · by alex-p', reviewers: ['FM', 'LP', 'RK'] },
        { repo: 'tanstack/query', number: 10183, title: 'Avoid redundant observer notification after hydration', meta: 'requested 2d ago · by sara', reviewers: ['FM', 'DK', 'more:2'] },
      ],
      mine: [
        { repo: 'acme/work-monorepo', number: 421, title: 'Virtualize long reasoning traces in the conversation view', meta: 'updated 12m ago · 18 comments', updatedMinutes: 12, reviewers: ['AK', 'JM', 'LP'] },
        { repo: 'FranciscoMoretti/osbe', number: 237, title: 'Use native tab groups for extension workspace restore', meta: 'updated 31m ago · 4 comments', updatedMinutes: 31, reviewers: [] },
        { repo: 'FranciscoMoretti/ai-registry', number: 96, title: 'Add capability snapshots to provider history', meta: 'updated 1h ago · 7 comments', updatedMinutes: 60, reviewers: ['RK', 'TS'] },
        { repo: 'acme/work-monorepo', number: 184, title: 'Index system-design diagrams by decision pattern', meta: 'updated 2h ago · 2 comments', updatedMinutes: 120, reviewers: ['MM'] },
        { repo: 'FranciscoMoretti/githubbar', number: 14, title: 'Document the first vertical implementation slices', meta: 'updated 5h ago · no comments', updatedMinutes: 300, reviewers: [] },
      ],
      drafts: [
        { repo: 'acme/work-monorepo', number: 426, title: 'Explore grouped tool-call rendering', meta: 'updated 9m ago', updatedMinutes: 9, reviewers: [] },
        { repo: 'FranciscoMoretti/osbe', number: 241, title: 'Prototype share-sheet capture flow', meta: 'updated yesterday', updatedMinutes: 1440, reviewers: ['LP'] },
      ],
    };

    const avatarPalette = ['#5b739d', '#8b5e83', '#4f8173', '#8c704c', '#6f638e', '#507a8d'];

    function loadRepositorySelection() {
      try {
        const saved = JSON.parse(localStorage.getItem(repositorySelectionKey));
        if (saved?.mode === 'selected' && Array.isArray(saved.repositories)) {
          const repositories = saved.repositories.filter(repo => filterableRepositories.includes(repo));
          if (repositories.length) return { mode: 'selected', repositories };
        }
      } catch (error) {
        console.warn('Ignoring invalid prototype repository selection', error);
      }
      return { mode: 'all', repositories: [] };
    }

    let repositorySelection = loadRepositorySelection();
    let filterMenuOpen = false;

    function saveRepositorySelection() {
      localStorage.setItem(repositorySelectionKey, JSON.stringify(repositorySelection));
    }

    function selectedRepositoryCounts() {
      if (repositorySelection.mode === 'all') return { ...allRepositoryTotals };
      return repositorySelection.repositories.reduce((totals, repository) => {
        const counts = repositoryTotals[repository] || { reviews: 0, mine: 0, drafts: 0 };
        totals.reviews += counts.reviews;
        totals.mine += counts.mine;
        totals.drafts += counts.drafts;
        return totals;
      }, { reviews: 0, mine: 0, drafts: 0 });
    }

    function filteredRows(list) {
      if (repositorySelection.mode === 'all') return datasets[list];
      return datasets[list].filter(pr => repositorySelection.repositories.includes(pr.repo));
    }

    function repositorySelectionLabel() {
      if (repositorySelection.mode === 'all') return 'All repositories';
      if (repositorySelection.repositories.length === 1) return repositorySelection.repositories[0];
      return `${repositorySelection.repositories.length} repositories`;
    }

    function repositoryFilterMarkup() {
      const selected = new Set(repositorySelection.repositories);
      return `
        <div class="repo-filter-strip">
          <span class="repo-filter-label">Showing</span>
          <button class="repo-filter-button" data-filter-toggle aria-expanded="${filterMenuOpen}" aria-label="Choose repositories. Current selection: ${repositorySelectionLabel()}">
            <span class="persisted" title="Saved on this Mac">●</span><strong>${repositorySelectionLabel()}</strong><span>⌄</span>
          </button>
          <div class="repo-filter-menu" ${filterMenuOpen ? '' : 'hidden'}>
            <div class="filter-menu-heading"><strong>Repositories</strong><span>This selection is saved on this Mac.</span></div>
            <button class="filter-all ${repositorySelection.mode === 'all' ? 'active' : ''}" data-filter-all>
              <span class="filter-check">✓</span><span>All repositories</span><span class="filter-repo-count">523 PRs</span>
            </button>
            ${filterableRepositories.map(repository => {
              const counts = repositoryTotals[repository];
              const total = counts.reviews + counts.mine + counts.drafts;
              return `<button class="filter-repo ${selected.has(repository) ? 'active' : ''}" data-filter-repo="${repository}">
                <span class="filter-check">✓</span><span class="filter-repo-name">${repository}</span><span class="filter-repo-count">${total}</span>
              </button>`;
            }).join('')}
            <div class="filter-menu-footer"><span>Device-local preference</span><button class="small-action primary" data-filter-done>Done</button></div>
          </div>
        </div>`;
    }

    function reviewerMarkup(reviewers) {
      if (!reviewers.length) return '';
      return reviewers.map((reviewer, index) => {
        if (reviewer.startsWith('more:')) {
          return `<span class="avatar more" aria-label="${reviewer.slice(5)} more reviewers" title="${reviewer.slice(5)} more reviewers">+${reviewer.slice(5)}</span>`;
        }
        const team = reviewer.startsWith('team:');
        const label = team ? reviewer.slice(5) : reviewer;
        const className = team ? 'avatar team' : 'avatar';
        const style = `--avatar:${avatarPalette[index % avatarPalette.length]}`;
        return `<span class="${className}" style="${style}" aria-label="${team ? 'Team ' : 'Reviewer '}${label}" title="${team ? 'Team ' : 'Reviewer '}${label}">${team ? '◇' : label}</span>`;
      }).join('');
    }

    function reviewerSummary(reviewers) {
      if (!reviewers.length) return 'no reviewers';
      return reviewers.map(reviewer => {
        if (reviewer.startsWith('more:')) return `${reviewer.slice(5)} more reviewers`;
        if (reviewer.startsWith('team:')) return `team ${reviewer.slice(5)}`;

    function rowMarkup(pr, options = {}) {
      const id = `${pr.repo}-${pr.number}`.replaceAll('/', '-');

    function codexbarRowMarkup(pr, { isDraft = false } = {}) {

      return `

    function codexbarSection(title, count, rows, extraClass = '', visibleRows = 3) {

          <h2 class="codexbar-section-heading">${title}<span>${count}</span></h2>

          ${remaining ? `<button class="codexbar-more" data-show-more>Show ${Math.min(20, remaining)} more…</button>` : ''}

    }

    function codexbarMyPullRequests(readyCount, draftCount, readyRows, draftRows) {
      const rows = [

        ...draftRows.map(pr => ({ ...pr, isDraft: true })),
      ].sort((a, b) => a.updatedMinutes - b.updatedMinutes);
      const shownRows = rows.slice(0, 6);
      const remaining = Math.max(0, readyCount + draftCount - shownRows.length);
      return `
        <section class="codexbar-section mine">
          <h2 class="codexbar-section-heading">My PRs<span>${readyCount + draftCount}</span></h2>
          ${shownRows.map(pr => codexbarRowMarkup(pr, { isDraft: pr.isDraft })).join('')}
          ${remaining ? `<button class="codexbar-more" data-show-more>Show ${Math.min(20, remaining)} more…</button>` : ''}
        </section>`;
    }

    }

      return `<svg class="codexbar-icon" viewBox="0 0 24 24" aria-hidden="true">${paths[name]}</svg>`;

    function codexbarStateBanner(state) {
      const states = {
        loading: {
          icon: 'refresh',
          title: 'Refreshing in the background',
          copy: 'The current snapshot stays available while GitHubBar checks every selected repository.',
          action: '',
        },
        stale: {
          icon: 'clock',
          title: 'Showing cached data',
          copy: 'The last complete snapshot is 18 minutes old. Counts and pull requests remain usable.',
          action: '<button class="codexbar-inline-action" data-codex-refresh>Refresh</button>',
        },
        error: {
          icon: 'alert',
          title: 'Refresh failed',
          copy: 'GitHub could not be reached. Nothing was removed from the last complete snapshot.',
          action: '<button class="codexbar-inline-action" data-codex-refresh>Retry</button>',
        },
        partial: {
          icon: 'alert',
          title: 'Incomplete access',
          copy: 'Three repositories need updated SSO or token access. Their last-known pull requests remain visible.',
          action: '<button class="codexbar-inline-action" data-open-settings>Review</button>',

      const detail = states[state];
      if (!detail) return '';
      return `<aside class="codexbar-state-banner ${state}" role="status" aria-live="polite">
        <span class="codexbar-menu-icon">${codexbarIcon(detail.icon)}</span>
        <span><strong>${detail.title}</strong>${detail.copy}</span>

    function codexbarRepositoryScope() {

            </button>
            ${filterableRepositories.map(repository => {

              const total = counts.reviews + counts.mine + counts.drafts;
              return `<button class="filter-repo ${selected.has(repository) ? 'active' : ''}" data-filter-repo="${repository}">

    function variantD() {
      const counts = selectedRepositoryCounts();
      const state = currentScenario();
      const startupState = !dataScenarios.includes(state);
      const stateLabels = {
        fresh: 'Updated 1m ago',
        initial: 'Loading first snapshot…',
        loading: 'Refreshing…',
        stale: 'Cached 18m ago',
        error: 'Refresh failed · cached data',
        partial: 'Incomplete access · cached data',
        'cli-missing': 'Account connection required',
        'cli-signin': 'Account connection required',
        'confirm-account': 'Confirm monitored account',
      };
      const accountLabels = {
        initial: '@FranciscoMoretti',
        'cli-missing': 'GitHub CLI ›',
        'cli-signin': 'GitHub CLI ›',

      return `
        <section class="popover variant-d ${startupState ? 'has-startup-state' : ''}" aria-label="Variant D CodexBar native menu">

          ${startupState ? codexbarStartupState(state) : `<div class="codexbar-scroll">

          </div>`}
          <footer class="codexbar-footer">
            ${startupState ? '' : `<div class="codexbar-menu-block">
              <button class="codexbar-menu-item" data-open-dashboard><span class="codexbar-menu-icon">${codexbarIcon('external')}</span><span>Open GitHub Dashboard</span><span></span>${codexbarChevron()}</button>
            </div>`}
            <div class="codexbar-menu-block">
              ${startupState ? '' : `<button class="codexbar-menu-item" data-codex-refresh><span class="codexbar-menu-icon">${codexbarIcon('refresh')}</span><span>Refresh</span><span></span><span class="codexbar-menu-key">⌘ R</span></button>`}
              <button class="codexbar-menu-item"><span class="codexbar-menu-icon">${codexbarIcon('settings')}</span><span>Settings…</span><span></span><span class="codexbar-menu-key">⌘ ,</span></button>

            </div>
          </footer>
        </section>`;
    }

    function currentVariant() {
      const requested = new URLSearchParams(location.search).get('variant')?.toUpperCase();
      return variants.some(item => item.key === requested) ? requested : 'A';
    }

    function currentScenario() {
      const requested = new URLSearchParams(location.search).get('scenario');
      if (requested === 'connection') return 'cli-signin';
      return scenarios.includes(requested) ? requested : 'fresh';
    }

    function setScenario(scenario) {
      if (!scenarios.includes(scenario)) return;
      const url = new URL(location.href);
      url.searchParams.set('scenario', scenario);
      history.replaceState(null, '', url);
      render();
    }

    function render() {
      const variant = currentVariant();
      const selectedScenario = currentScenario();
      const scenario = variant === 'D' || ['fresh', 'loading', 'stale', 'error'].includes(selectedScenario) ? selectedScenario : 'fresh';
      document.body.dataset.state = scenario;
      document.getElementById('stage').innerHTML = variant === 'B' ? variantB() : variant === 'C' ? variantC() : variant === 'D' ? variantD() : variantA();
      const menuCount = variant === 'D' && !dataScenarios.includes(scenario) ? 0 : variant === 'A' || variant === 'D' ? selectedRepositoryCounts().reviews : 12;
      const statusTrigger = document.querySelector('.status-trigger');
      document.getElementById('statusMenuCount').textContent = menuCount > 9 ? '9+' : menuCount;
      statusTrigger.dataset.count = menuCount;
      statusTrigger.setAttribute('aria-label', `GitHubBar, ${menuCount} reviews waiting`);
      document.querySelectorAll('[data-scenario]').forEach(button => {
        button.setAttribute('aria-pressed', String(button.dataset.scenario === selectedScenario));
      });
      document.querySelector('.scenario-switcher').hidden = variant !== 'D';
      const detail = variants.find(item => item.key === variant);
      document.getElementById('variantLabel').innerHTML = `${detail.key}<small>— ${detail.name}</small>`;
      document.title = `GitHubBar Prototype · ${detail.key} ${detail.name} · ${scenario}`;
      wireInteractions();
    }

    function setVariant(delta) {
      const current = variants.findIndex(item => item.key === currentVariant());
      const next = variants[(current + delta + variants.length) % variants.length];
      const url = new URL(location.href);
      url.searchParams.set('variant', next.key);
      history.replaceState(null, '', url);
      render();
    }

    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('show');
      clearTimeout(window.toastTimer);
      window.toastTimer = setTimeout(() => toast.classList.remove('show'), 1500);
    }

    function wireInteractions() {
      document.querySelectorAll('[data-state-choice]').forEach(button => {
        button.addEventListener('click', () => setScenario(button.dataset.stateChoice));
      });

      document.querySelectorAll('[data-collapse]').forEach(button => {
        button.addEventListener('click', () => button.closest('.section').classList.toggle('collapsed'));
      });

      document.querySelector('[data-filter-toggle]')?.addEventListener('click', () => {
        filterMenuOpen = !filterMenuOpen;
        render();
      });

      document.querySelector('[data-filter-all]')?.addEventListener('click', () => {
        repositorySelection = { mode: 'all', repositories: [] };
        saveRepositorySelection();
        render();
      });

      document.querySelectorAll('[data-filter-repo]').forEach(button => {
        button.addEventListener('click', () => {
          const repository = button.dataset.filterRepo;
          const repositories = repositorySelection.mode === 'selected' ? [...repositorySelection.repositories] : [];
          const index = repositories.indexOf(repository);
          if (index >= 0) repositories.splice(index, 1);
          else repositories.push(repository);
          repositorySelection = repositories.length ? { mode: 'selected', repositories } : { mode: 'all', repositories: [] };
          saveRepositorySelection();
          render();
        });
      });

      document.querySelector('[data-filter-done]')?.addEventListener('click', () => {
        filterMenuOpen = false;
        render();
      });

      document.querySelectorAll('[data-open-pr]').forEach(button => {
        button.addEventListener('click', () => showToast(`Would open ${button.dataset.repo} on GitHub`));
      });

      document.querySelectorAll('[data-show-more]').forEach(button => {
        button.addEventListener('click', () => showToast('Would reveal the next 20 pull requests'));
      });
      document.querySelector('[data-open-dashboard]')?.addEventListener('click', () => showToast('Would open your GitHub pull-request dashboard'));
      document.querySelectorAll('[data-codex-refresh]').forEach(button => {
        button.addEventListener('click', () => {
          setScenario('loading');
          window.setTimeout(() => {
            setScenario('fresh');
            showToast('Pull requests refreshed');
          }, 650);
        });
      });
      document.querySelector('[data-open-settings]')?.addEventListener('click', () => showToast('Would open access coverage settings'));
      document.querySelector('[data-connect-guide]')?.addEventListener('click', () => showToast('Would open GitHub CLI setup instructions'));
      document.querySelector('[data-check-cli]')?.addEventListener('click', () => setScenario('cli-signin'));
      document.querySelector('[data-check-connection]')?.addEventListener('click', () => {
        setScenario('confirm-account');
      });
      document.querySelectorAll('[data-account]').forEach(button => {
        button.addEventListener('click', () => {
          selectedAccount = button.dataset.account;
          render();
        });
      });
      document.querySelector('[data-confirm-account]')?.addEventListener('click', () => {
        setScenario('initial');
        window.setTimeout(() => {
          setScenario('fresh');
          showToast(`Monitoring @${selectedAccount}`);
        }, 650);
      });

      document.querySelectorAll('[data-tab]').forEach(button => {
        button.addEventListener('click', () => {
          sessionStorage.setItem('prototype-tab', button.dataset.tab);
          render();
        });
      });

      document.querySelectorAll('[data-pane]').forEach(button => {
        button.addEventListener('click', () => {
          sessionStorage.setItem('prototype-pane', button.dataset.pane);
          render();
        });
      });

      document.querySelectorAll('.pr-row').forEach(row => {
        const select = () => {
          document.querySelectorAll('.pr-row').forEach(other => other.classList.toggle('selected', other === row && !row.classList.contains('selected')));
        };
        row.addEventListener('click', event => { if (!event.target.closest('[data-action]')) select(); });
        row.addEventListener('keydown', event => { if (event.key === 'Enter' || event.key === ' ') { event.preventDefault(); select(); } });
      });

      document.querySelectorAll('[data-action]').forEach(button => {
        button.addEventListener('click', event => {
          event.stopPropagation();
          const row = button.closest('.pr-row');
          const repo = row.dataset.repo;
          const action = button.dataset.action;
          if (action === 'snooze') {
            row.classList.add('muted-row');
            showToast('Snoozed locally until tomorrow');
          } else if (action === 'mute') {
            document.querySelectorAll(`[data-repo="${CSS.escape(repo)}"]`).forEach(item => item.classList.add('muted-row'));
            showToast(`Muted ${repo} locally`);
          } else if (action === 'copy') {
            showToast('PR link copied');
          } else {
            showToast('Would open this PR on GitHub');
          }
        });
      });
    }

    document.getElementById('previousVariant').addEventListener('click', () => setVariant(-1));
    document.getElementById('nextVariant').addEventListener('click', () => setVariant(1));
    document.querySelectorAll('[data-scenario]').forEach(button => {
      button.addEventListener('click', () => setScenario(button.dataset.scenario));
    });
    window.addEventListener('popstate', render);
    window.addEventListener('keydown', event => {
      const target = event.target;
      if (target.matches('input, textarea, button, select, [contenteditable]')) return;
      if (event.key === 'ArrowLeft') setVariant(-1);
      if (event.key === 'ArrowRight') setVariant(1);
      if (event.key === 'Escape' && filterMenuOpen) {
        filterMenuOpen = false;
        render();
      }
    });

    render();
  </script>
</body>
</html>
