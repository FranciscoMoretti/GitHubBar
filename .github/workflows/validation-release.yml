name: Validation prerelease

on:
  push:
    tags:
      - "validation-v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "New validation tag (for example validation-v0.1.0-1)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve validation version
        id: release
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ inputs.tag || github.ref_name }}"
          if [[ ! "$tag" =~ ^validation-v[0-9]+\.[0-9]+\.[0-9]+-[0-9]+$ ]]; then
            echo "Tag must match validation-vMAJOR.MINOR.PATCH-N" >&2
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=${tag#validation-v}" | sed 's/-[0-9]*$//' >> "$GITHUB_OUTPUT"

      - name: Build universal validation artifact
        env:
          GITHUBBAR_VERSION: ${{ steps.release.outputs.version }}
        run: scripts/package-validation.sh

      - name: Create GitHub prerelease
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          gh release create "$TAG" \
            dist/GitHubBar-validation-*.zip \
            dist/GitHubBar-validation-*.zip.sha256 \
            --target "$GITHUB_SHA" \
            --prerelease \
            --title "GitHubBar $TAG" \
            --notes-file docs/releases/validation-release.md
